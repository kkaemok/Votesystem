# 여러 보상 커맨드를 순서대로 실행합니다. {player} 플레이스홀더 사용 가능
reward-commands:
  - "레능 코인 {player} 150"
message-enabled: true
message-voted: "추천 감사합니다! 150 코인이 지급되었습니다."
data-storage: "data.yml"
command-permission: "votesystem.reload"
recommend-link: "https://example.com/vote"

reminder:
  # 플레이어에게 보낼 알림 메시지입니다. {player}, {link} 플레이스홀더를 사용할 수 있습니다.
  message:
    - "&6[추천] &f서버가 마음에 드셨다면 추천 부탁드려요!"
    - "&e추천 링크: &b{link}"

  # 플레이어 접속 시 해당 플레이어에게만 알림
  join:
    enabled: true
    delay-seconds: 2
    # 같은 플레이어에게 접속 알림이 재전송되기까지의 최소 간격(0 = 비활성화)
    cooldown-seconds: 0

  # 매일 특정 시간(24시간제, HH:mm 또는 HH:mm:ss)에 전체 알림
  scheduled:
    enabled: false
    timezone: "system" # 예: Asia/Seoul, UTC, system(서버 시스템 타임존)
    times:
      - "12:00"
      - "20:00"

  # 주기적(반복) 전체 알림
  interval:
    enabled: false
    period-minutes: 60
    initial-delay-minutes: 5

  # 비워두면 전체 플레이어 대상, 권한 문자열을 넣으면 해당 권한 보유자에게만 전체 알림 전송
  broadcast-permission: ""

  sound:
    enabled: true
    name: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 1.0
    pitch: 1.0
